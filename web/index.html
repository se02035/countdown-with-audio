<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>countdown-with-audio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <section class="stage" aria-live="polite" aria-atomic="true">
        <div class="stage__display-wrap">
          <div id="display" class="stage__display" data-text="01:30">01:30</div>
        </div>
        <div id="status" class="stage__status">READY</div>

        <div class="stage__actions">
          <button id="startBtn" type="button" class="btn">START</button>
          <button id="pauseBtn" type="button" class="btn" disabled>PAUSE</button>
          <button id="resetBtn" type="button" class="btn" disabled>RESET</button>
        </div>
      </section>

      <form id="controls" class="settings">
        <label class="settings__row">
          <span>-d</span>
          <input
            id="duration"
            name="duration"
            type="text"
            value="1m30s"
            placeholder="1m30s"
            autocomplete="off"
            spellcheck="false"
          />
        </label>

        <label class="settings__row">
          <span>-a</span>
          <input
            id="audioCutoff"
            name="audioCutoff"
            type="number"
            value="-1"
            step="0.1"
            placeholder="-1"
          />
        </label>

        <label class="settings__row">
          <span>-p</span>
          <select id="track" name="track">
            <option value="random">random</option>
          </select>
        </label>
      </form>
    </main>

    <audio id="player" preload="auto"></audio>
    <script src="app.js" type="module"></script>
  </body>
</html>
